<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · auth popup</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:#fff;color:#242424;padding:22px;}
  h1{font-size:18px;font-weight:600;margin-bottom:4px;}
  .sub{color:#605e5c;font-size:13px;margin-bottom:16px;}
  button{font-family:inherit;font-size:13px;cursor:pointer;border-radius:4px;padding:8px 16px;border:none;background:#0078d4;color:#fff;}
  button:hover{background:#106ebe;}
  .log{background:#1b1a19;color:#d6d6d6;border-radius:6px;margin-top:16px;padding:10px 12px;font-family:ui-monospace,Consolas,monospace;font-size:12px;line-height:1.6;max-height:340px;overflow:auto;}
  .log .ok{color:#5bd85b;} .log .err{color:#ff6b6b;} .log .warn{color:#ffc46b;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #c8c6c4;border-top-color:#0078d4;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion: reduce){.spinner{animation:none;}}
</style>
</head>
<body>
  <h1>Microsoft sign-in (simulated)</h1>
  <div class="sub" id="status"><span class="spinner"></span>Completing sign-in, preparing to send the auth code back to the parent tab…</div>
  <button id="manualBtn">Manually complete sign-in and send back</button>
  <div class="log" id="log"></div>

<script>
const CHANNEL='d365_auth_repro';
const logEl=document.getElementById('log');
function log(msg,cls){
  const t=new Date().toISOString().substr(11,12);
  const r=document.createElement('div');
  r.innerHTML='<span style="color:#7a7a7a">'+t+'</span>  <span class="'+(cls||'')+'">'+msg.replace(/</g,'&lt;')+'</span>';
  logEl.appendChild(r); logEl.scrollTop=logEl.scrollHeight;
}

log('Popup loaded: '+location.href);

// Immediately report opener status to the parent (the key signal for whether the tabs are severed)
const openerPresent = !!window.opener;
log('window.opener = '+(openerPresent ? 'present' : 'NULL — link to the parent tab is severed'), openerPresent?'ok':'err');
try{
  const infoBc=new BroadcastChannel(CHANNEL+'_info');
  infoBc.postMessage({opener: openerPresent});
  log('Reported opener status to the parent tab via BroadcastChannel');
}catch(e){ log('Could not report opener status: '+e,'warn'); }

const code='FAKE_CODE_'+Math.random().toString(36).slice(2,10);

function completeSignIn(){
  document.getElementById('status').textContent='Signed in, sending auth code back…';
  log('Sending code back over three channels: code='+code,'');

  // Channel A: BroadcastChannel
  try{
    const bc=new BroadcastChannel(CHANNEL);
    bc.postMessage({code, via:'broadcastchannel'});
    log('① sent via BroadcastChannel','ok');
  }catch(e){ log('① BroadcastChannel send failed: '+e,'err'); }

  // Channel B: postMessage to opener
  try{
    if(window.opener){
      window.opener.postMessage({code, via:'postmessage'}, '*');
      log('② sent via window.opener.postMessage','ok');
    }else{
      log('② cannot postMessage: window.opener is NULL','err');
    }
  }catch(e){ log('② opener.postMessage failed: '+e,'err'); }

  // Channel C: write the code into our own location.hash for the parent to poll same-origin
  try{
    location.hash='code='+code;
    log('③ set location.hash = #code=… (parent can read via same-origin polling)','ok');
  }catch(e){ log('③ setting hash failed: '+e,'err'); }

  log('Send complete. If the parent receives any channel, sign-in is considered successful.');
}

document.getElementById('manualBtn').onclick=completeSignIn;

// Simulate the login-page redirect delay; auto-send after 1.2s (in a normal browser this ends the loop)
setTimeout(completeSignIn, 1200);
</script>
</body>
</html>
